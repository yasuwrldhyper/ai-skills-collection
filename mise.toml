[tools]
node = "22"

[tasks.lint]
description = "Lint Markdown files (docs we own)"
run = """
npx markdownlint-cli2 \
  "**/*.md" "!.agent/**" "!.agents/**" "!.claude/**" "!skills/**" "!templates/**" \
  --config .markdownlint.json
"""

[tasks."setup:hooks"]
description = "Install git pre-commit hooks"
run = """
cp scripts/hooks/pre-commit .git/hooks/pre-commit
chmod +x .git/hooks/pre-commit
echo "pre-commit hook installed"
"""

[tasks.setup]
description = "Install skills and apply review convention"
run = "bash scripts/setup-project.sh ${@:-p1-ja}"

[tasks."setup:skills"]
description = "Install only the 3 skills (without convention template)"
run = """
npx skills add yasuwrldhyper/ai-skills-collection@worktree-implement -y
npx skills add yasuwrldhyper/ai-skills-collection@resolve-pr-reviews -y
npx skills add yasuwrldhyper/ai-skills-collection@review-comment-convention -y
"""

[tasks."setup:convention"]
description = "Apply review convention template only"
run = "SKIP_SKILLS_INSTALL=1 bash scripts/setup-project.sh ${@:-p1-ja}"
